<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omkar Ekale - Property Advisor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            line-height: 1.6; color: #333; background: #ffffff; 
        }
        header { 
            background: #1a1a1a; color: white; padding: 1.2rem 0; 
            position: fixed; width: 100%; top: 0; z-index: 1000; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        nav { 
            max-width: 1200px; margin: 0 auto; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 2rem; 
        }
        .logo { font-size: 1.6rem; font-weight: 700; color: #ff6200; display: flex; align-items: center; gap: 0.5rem; }
        .nav-links { display: flex; list-style: none; gap: 2.5rem; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #ff6200; }
        .hero { 
            background: linear-gradient(135deg, #ff6200 0%, #ff8c42 100%); 
            height: 90vh; display: flex; align-items: center; justify-content: center; 
            text-align: center; color: white; margin-top: 80px; 
        }
        .hero-content h1 { font-size: 3.2rem; font-weight: 700; margin-bottom: 1rem; }
        .hero-content p { font-size: 1.3rem; margin-bottom: 2.5rem; }
        .cta-button { 
            background: #1a1a1a; color: white; padding: 16px 36px; border: none; 
            border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; 
            transition: all 0.3s; text-decoration: none; display: inline-block; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .cta-button:hover { background: #ff6200; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,98,0,0.3); }
        .section { padding: 90px 2rem; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2.5rem; text-align: center; margin-bottom: 2.5rem; color: #1a1a1a; font-weight: 700; }
        .properties-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem; }
        .property-card { 
            background: white; border-radius: 16px; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); transition: all 0.3s; 
            border: 1px solid #f0f0f0;
        }
        .property-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); }
        .property-image { height: 200px; background: linear-gradient(135deg, #ff6200, #ff8c42); }
        .property-info { padding: 1.8rem; }
        .property-price { font-size: 1.7rem; font-weight: 700; color: #ff6200; margin-bottom: 0.5rem; }
        .property-title { font-size: 1.3rem; font-weight: 600; color: #1a1a1a; margin-bottom: 1rem; }
        .property-basic { 
            background: #f8f9fa; padding: 1rem; border-radius: 8px; 
            font-size: 0.95rem; color: #555; margin-bottom: 1.2rem;
        }
        .client-benefit { 
            background: linear-gradient(90deg, #ff6200, #ff8c42); 
            color: white; padding: 0.8rem; border-radius: 8px; 
            font-weight: 600; text-align: center; font-size: 0.95rem;
        }
        .view-btn { 
            width: 100%; background: #ff6200; color: white; border: none; 
            padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; 
            transition: all 0.3s; text-decoration: none; display: block; text-align: center;
        }
        .view-btn:hover { background: #e55a00; transform: translateY(-1px); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        .phone-highlight { 
            background: #ff6200; color: white; padding: 20px 28px; border-radius: 12px; 
            font-size: 1.6rem; font-weight: 700; display: inline-flex; align-items: center; 
            gap: 0.8rem; text-decoration: none; box-shadow: 0 8px 25px rgba(255,98,0,0.3); 
            transition: all 0.3s; margin: 1rem 0;
        }
        .phone-highlight:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255,98,0,0.4); }
        .contact-form { background: #f8f9fa; padding: 2.5rem; border-radius: 16px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 16px; border: 2px solid #e9ecef; border-radius: 8px; 
            font-size: 1rem; margin-bottom: 1.5rem; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #ff6200; }
        .submit-btn { 
            width: 100%; background: #ff6200; color: white; border: none; padding: 18px; 
            border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; 
            transition: all 0.3s;
        }
        .submit-btn:hover { background: #e55a00; transform: translateY(-2px); }
        @media (max-width: 768px) { 
            .hero-content h1 { font-size: 2.5rem; } 
            .nav-links { display: none; } 
            .contact-grid { grid-template-columns: 1fr; } 
            .properties-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
